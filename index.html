<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: transparent;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #37352f;
        }
        .container { text-align: center; }
        .greeting {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 5px;
        }
        .quote {
            font-size: 1rem;
            color: #7a7a7a;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="greeting" class="greeting"></div>
        <div id="quote" class="quote"></div>
    </div>

    <script>
        function updateWidget() {
            const now = new Date();
            const hour = now.getHours();
            const day = now.getDay();
            
            let greetText = (hour < 12) ? "🌅 Chào buổi sáng!" : (hour < 18) ? "☀️ Chào buổi chiều!" : "🌙 Chào buổi tối!";
            
            const quotes = [
                "Chủ Nhật nạp năng lượng. ✨",
                "Thứ Hai khởi đầu mới. 🚀",
                "Thứ Ba năng suất. 💪",
                "Thứ Tư kiên trì. ☕️",
                "Thứ Năm bứt phá. 🎯",
                "Thứ Sáu hoàn thành. 🎉",
                "Thứ Bảy thư giãn. 🌱"
            ];

            document.getElementById('greeting').innerText = greetText;
            document.getElementById('quote').innerText = "Hôm nay là " + now.toLocaleDateString('vi-VN', {weekday: 'long'}) + ". " + quotes[day];
        }
        updateWidget();
    </script>
</body>
</html>
