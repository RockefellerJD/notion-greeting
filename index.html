<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Greeting Widget</title>
    <style>
        /* Swiss Design Principles: Minimalist, Sans-serif, Strong Grids */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: transparent;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #37352f;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .greeting {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.04em; /* Tight kerning for Swiss style */
            margin-bottom: 8px;
            line-height: 1.1;
        }

        .quote {
            font-size: 1.1rem;
            color: #7a7a7a;
            font-weight: 450;
            letter-spacing: -0.01em;
            max-width: 400px;
            margin: 0 auto;
        }

        /* Subtle accent color */
        .highlight {
            color: #eb5757; /* Classic Swiss Red accent */
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="greeting" class="greeting"></div>
        <div id="quote" class="quote"></div>
    </div>

    <script>
        function updateWidget() {
            const now = new Date();
            const hour = now.getHours();
            const day = now.getDay();
            
            // Time-based greetings
            let greetText;
            if (hour < 12) greetText = "Good Morning.";
            else if (hour < 18) greetText = "Good Afternoon.";
            else greetText = "Good Evening.";
            
            // Minimalist daily inspiration
            const quotes = [
                "Recharge and reflect for the week ahead.",
                "A fresh start to a productive week.",
                "Stay focused and keep momentum.",
                "Halfway there. Maintain the pace.",
                "The finish line is within sight.",
                "Finish strong and enjoy the results.",
                "Unwind and prioritize yourself."
            ];

            const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

            document.getElementById('greeting').innerHTML = greetText;
            document.getElementById('quote').innerHTML = `It's <span class="highlight">${days[day]}</span>. ${quotes[day]}`;
        }
        
        updateWidget();
        // Update every minute to ensure accuracy
        setInterval(updateWidget, 60000);
    </script>
</body>
</html>
